<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f3;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #333;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #444;
        }

        /* NÚT QUAY LẠI */
        .back-link {
            display: inline-block;
            margin: 30px 40px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .back-link:hover {
            color: #333;
        }

        /* CONTAINER CHI TIẾT */
        .detail-container {
            display: flex;
            gap: 60px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px 80px;
            background-color: #f5f5f3;
        }

        /* ẢNH SẢN PHẨM */
        .detail-image {
            flex: 1;
        }

        .detail-image img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            filter: brightness(1.02) saturate(0.9);
        }

        .detail-image .no-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ede9e4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 13px;
        }

        /* THÔNG TIN SẢN PHẨM */
        .detail-info {
            flex: 1;
            padding-top: 10px;
        }

        .detail-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 400;
            color: #444;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .detail-info .price {
            font-size: 20px;
            color: #888;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }

        .detail-info .label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 6px;
        }

        .detail-info .value {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            .detail-container {
                flex-direction: column;
                padding: 0 20px 40px;
                gap: 24px;
            }

            .back-link {
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>VĂN PHÒNG PHẨM NÓTE</h1>
    </header>

    <a class="back-link" href="{% url 'product_list' %}">← Quay lại danh sách</a>

    <div class="detail-container">

        <!-- ẢNH -->
        <div class="detail-image">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
            {% else %}
                <div class="no-image">Chưa có ảnh</div>
            {% endif %}
        </div>

        <!-- THÔNG TIN -->
        <div class="detail-info">
            <h2>{{ product.name }}</h2>
            <p class="price">{{ product.price }}đ</p>

            <hr class="divider">

            <p class="label">Số lượng</p>
            <p class="value">{{ product.quantity }}</p>

            <p class="label">Mô tả sản phẩm</p>
            <p class="value">{{ product.description }}</p>
        </div>

    </div>

</body>
</html>
