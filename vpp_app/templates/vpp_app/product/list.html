<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f3;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            color: #333;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 2px;
            color: #444;
        }

        /* TIÊU ĐỀ SECTION */
        .section-title {
            text-align: center;
            padding: 40px 20px 20px;
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 400;
            color: #555;
            letter-spacing: 1px;
        }

        /* LƯỚI SẢN PHẨM */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        /* CARD SẢN PHẨM */
        .product-card {
            background-color: #fff;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            filter: brightness(1.02) saturate(0.9);
        }

        .product-card .no-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f0ece8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 13px;
        }

        /* THÔNG TIN SẢN PHẨM */
        .product-info {
            padding: 12px 4px;
        }

        .product-info h3 {
            font-size: 13px;
            font-weight: 400;
            color: #444;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .product-info .price {
            font-size: 13px;
            color: #888;
            font-weight: 300;
        }

        .product-info a {
            text-decoration: none;
            color: inherit;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 20px;
            }
        }

        @media (max-width: 500px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>VĂN PHÒNG PHẨM NÓTE</h1>
    </header>

    <p class="section-title">Danh sách sản phẩm</p>

    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <a href="{% url 'product_detail' product.pk %}">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% else %}
                    <div class="no-image">Chưa có ảnh</div>
                {% endif %}
                <div class="product-info">
                    <h3>{{ product.name }}</h3>
                    <p class="price">{{ product.price }}đ</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
